[workspace]
resolver = "2"
members = [
    "crates/channels",
    "crates/agent",
    "crates/memory",
    "crates/plugins",
    "crates/gateway",
    "crates/providers",
]

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
thiserror = "1"
chrono = "0.4"
reqwest = "0.11.14"
uuid = { version = "1", features = ["v4"] }
